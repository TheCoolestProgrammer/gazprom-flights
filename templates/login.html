<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Система перевозок</title>
    <style>
        :root {
            --gazprom-blue: #0079C1;
            --gazprom-dark: #004F9F;
            --light-grey: #f4f7f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-grey);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--gazprom-blue);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--gazprom-dark);
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: var(--gazprom-blue);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--gazprom-blue);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        button:hover {
            background-color: var(--gazprom-dark);
        }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">ГАЗПРОМ</div>
    <h3 style="text-align: center; color: #444; margin-bottom: 2rem;">Управление перевозками</h3>
    {% if error %}
        <div style="background-color: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 4px; margin-bottom: 1rem; font-size: 14px; text-align: center; border: 1px solid #f87171;">
            {{ error }}
        </div>
    {% endif %}
    <form action="/auth/login" method="post">
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" name="login" required placeholder="Введите ваш логин">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit">Войти в систему</button>
    </form>
    
    <div class="footer-text">
        © 2026 ПАО «Газпром» <br> Внутренняя информационная система
    </div>
</div>

</body>
</html>
