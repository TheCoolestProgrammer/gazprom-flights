{% extends "base.html" %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Мои заявки на перевозку</h2>
    </div>

    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>ФИО</th>
                <th>Паспорт</th>
                <th>Цель</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.request_date }}</td>
                <td>{{ req.fullname }}</td>
                <td>{{ req.passport }}</td>
                <td>{{ req.trip_purpose[:30] }}...</td>
                <td>
                    <span class="status-{{ req.status.name.lower() }}">
                        {{ req.status.value }}
                    </span>
                </td>

                <td>
                    <button type="button" 
                        class="btn btn-danger" 
                        onclick="change_request_status('{{ req.id }}', 'confirmed')"
                        style="background: #13f438; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;">
                        одобрить
                    </button>
                </td>

                <td>
                    <button type="button" 
                        class="btn btn-danger" 
                        onclick="change_request_status('{{ req.id }}', 'rejected')"
                        style="background: #dc3545; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;">
                        отклонить
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
async function change_request_status(passengerId,status) {

    try {
        const response = await fetch(`/department_director/change_status/${passengerId}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ "request_status": status })
        });

        if (response.ok) {
            alert('статус изменен');
            window.location.reload(); 
        } else {
            const errorData = await response.json();
            alert('Ошибка при изменении: ' + (errorData.detail || 'Неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Произошла системная ошибка при попытке удаления');
    }
}
</script>
{% endblock %}
