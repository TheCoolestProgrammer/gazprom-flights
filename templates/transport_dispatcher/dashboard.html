{% extends "base.html" %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Мои заявки на перевозку</h2>
        <a href="/transport_dispatcher/create" class="btn btn-primary">+ Новая заявка</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>ФИО</th>
                <th>Паспорт</th>
                <th>Цель</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.request_date }}</td>
                <td>{{ req.fullname }}</td>
                <td>{{ req.passport }}</td>
                <td>{{ req.trip_purpose[:30] }}...</td>
                <td>
                    <span class="status-{{ req.status.name.lower() }}">
                        {{ req.status.value }}
                    </span>
                </td>
                <td>
                    <a href="/transport_dispatcher/edit/{{ req.id }}">📝</a>
                </td>
                <td>
                    <button type="button" 
                        class="btn btn-danger" 
                        onclick="deletePassenger('{{ req.id }}')"
                        style="background: #dc3545; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;">
                        Удалить
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
async function deletePassenger(passengerId) {

    try {
        const response = await fetch(`/transport_dispatcher/delete/${passengerId}`, {
            method: 'DELETE',
        });

        if (response.ok) {
            alert('Запись успешно удалена');
            window.location.reload(); 
        } else {
            const errorData = await response.json();
            alert('Ошибка при удалении: ' + (errorData.detail || 'Неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Произошла системная ошибка при попытке удаления');
    }
}
</script>
{% endblock %}
