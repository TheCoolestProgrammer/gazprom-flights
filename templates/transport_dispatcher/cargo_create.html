{% extends "base.html" %}

{% block title %}Новый груз | Система Газпром{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2 style="color: var(--gz-dark); margin-bottom: 1.5rem; border-bottom: 2px solid var(--gz-blue); padding-bottom: 0.5rem;">
        Создание грузовой заявки
    </h2>

    <form action="/transport_dispatcher/cargo/create" method="post" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="grid-column: span 2;">
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Название груза</label>
            <input type="text" name="cargo_name" required placeholder="Название груза" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Род упаковки</label>
            <select name="packaging_type" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Выберите упаковку</option>
                {% for packaging in PackagingType %}
                    <option value="{{ packaging.value }}">{{ packaging.value }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">№ мест</label>
            <input type="number" name="places_count" min="1" value="1" required 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        
        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Откуда</label>
            <select name="flight_from" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Откуда</option>
                {% for airport in airports %}
                    <option value="{{ airport.id }}">{{ airport.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Куда</label>
            <select name="flight_to" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Куда</option>
                {% for airport in airports %}
                    <option value="{{ airport.id }}">{{ airport.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Вес (кг)</label>
            <input type="number" step="0.1" name="weight" required 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Опасный груз</label>
            <select name="hazardous" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="false">Нет</option>
                <option value="true">Да</option>
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Размещение</label>
            <select name="location" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Выберите тип</option>
                {% for location in CargoLocation %}
                    <option value="{{ location.value }}">{{ location.value }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Планируемая дата</label>
            <input type="date" name="planning_date" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div style="grid-column: span 2; display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" class="btn btn-primary" style="flex: 1; font-weight: bold;">Создать груз</button>
            <a href="/transport_dispatcher/cargo" class="btn btn-secondary" style="flex: 1; text-align:center;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
