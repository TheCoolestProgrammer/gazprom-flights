{% extends "base.html" %}

{% block title %}Новая заявка | Система Газпром{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2 style="color: var(--gz-dark); margin-bottom: 1.5rem; border-bottom: 2px solid var(--gz-blue); padding-bottom: 0.5rem;">
        Создание заявки на перевозку
    </h2>

    <form action="/transport_dispatcher/create" method="post" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            
        <div style="grid-column: span 2; position: relative;">
            <label style="display:block; margin-bottom:5px; font-weight: 500;">ФИО сотрудника</label>
            <input type="text" name="fullname" id="fullnameInput" required placeholder="Иванов Иван Иванович" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            <div id="autocompleteList" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto; z-index: 1000; display: none;"></div>
        </div>


        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Серия и номер паспорта</label>
            <input type="number" name="passport" id="passportInput" required placeholder="1234567890" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Дата рождения</label>
            <input type="date" name="birthdate" id="birthdateInput" required 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Пол</label>
            <select name="gender" id="genderInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="муж">Мужской</option>
                <option value="жен">Женский</option>
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Вес груза (кг)</label>
            <input type="number" step="0.1" name="cargo_weight" id="cargoWeightInput" placeholder="0.0" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div style="grid-column: span 2;">
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Принадлежит филиалу</label>
            <select name="department_id" id="departmentInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Выберите филиал</option>
                {% for route in departments %}
                    <option value="{{ route.id }}">{{ route.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Место отправления</label>
            <select name="flight_from" id="flightFromInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Откуда</option>
                {% for dept in airports %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Точка назначения</label>
            <select name="flight_to" id="flightToInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Куда</option>
                {% for route in airports %}
                    <option value="{{ route.id }}">{{ route.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Планируемая дата</label>
            <input type="date" name="planning_date" id="planningDateInput" required 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div>
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Номер заявки</label>
            <input type="number" name="application_id" placeholder="№"
                      style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <div style="grid-column: span 2;">
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Цель поездки</label>
            <select name="trip_purpose" id="tripPurposeInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Выберите цель</option>
                {% for purpose in TripPurpose %}
                    <option value="{{ purpose.value }}">{{ purpose.value }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="grid-column: span 2;">
            <label style="display:block; margin-bottom:5px; font-weight: 500;">Отношение к ГТЮ</label>
            <select name="gtu_relation" id="gtuRelationInput" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background: white;">
                <option value="" disabled selected>Выберите отношение</option>
                {% for relation in GTURelation %}
                    <option value="{{ relation.value }}">{{ relation.value }}</option>
                {% endfor %}
            </select>
        </div>
        <!-- Кнопки -->
        <div style="grid-column: span 2; display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" class="btn btn-primary" style="flex: 1; font-weight: bold;">
                ОТПРАВИТЬ ЗАЯВКУ
            </button>
            <a href="/" class="btn" style="background: #ccc; color: #333; text-align: center; line-height: 24px;">Отмена</a>
        </div>
        
    </form>
</div>

<script>
const fullnameInput = document.getElementById('fullnameInput');
const autocompleteList = document.getElementById('autocompleteList');
let debounceTimer;

fullnameInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const query = this.value.trim();
    
    if (query.length < 2) {
        autocompleteList.style.display = 'none';
        return;
    }
    
    debounceTimer = setTimeout(() => {
        fetch(`/transport_dispatcher/search-passengers?query=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                if (data.passengers && data.passengers.length > 0) {
                    autocompleteList.innerHTML = data.passengers.map(p => 
                        `<div style="padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; hover: {background: #f5f5f5}" 
                              onmouseover="this.style.background='#f5f5f5'" 
                              onmouseout="this.style.background='white'"
                              onclick="selectPassenger(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                            <strong>${p.fullname}</strong> | Паспорт: ${p.passport} | ${p.birthdate}
                        </div>`
                    ).join('');
                    autocompleteList.style.display = 'block';
                } else {
                    autocompleteList.style.display = 'none';
                }
            });
    }, 300);
});

function selectPassenger(passenger) {
    document.getElementById('fullnameInput').value = passenger.fullname;
    document.getElementById('passportInput').value = passenger.passport;
    document.getElementById('birthdateInput').value = passenger.birthdate;
    document.getElementById('genderInput').value = passenger.gender;
    document.getElementById('departmentInput').value = passenger.department_id;
    
    autocompleteList.style.display = 'none';
}

// Закрывать список при клике вне него
document.addEventListener('click', function(e) {
    if (e.target !== fullnameInput && e.target !== autocompleteList) {
        autocompleteList.style.display = 'none';
    }
});
</script>

{% endblock %}
